name: safe-price

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  safe-price:
    name: Safe-price gates (ESLint + Jest scanner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run safe-price checks (ESLint + Jest scanner)
        run: ./scripts/safe-price-checks.sh
