<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline' https://apis.google.com https://www.google.com https://gstatic.com https://js.stripe.com;"
    />
    <meta name="theme-color" content="#5276b0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Gig Aid - Manage Your Gig Work</title>
    <meta
      name="description"
      content="Gig Aid helps plumbers, cleaners, and electricians manage clients, jobs, leads, and invoices with an easy mobile-first interface."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <div
      id="loading-fallback"
      style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #fff;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Roboto, system-ui, sans-serif;
      "
    >
      <div style="text-align: center; max-width: 320px; padding: 24px">
        <h2
          style="
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 500;
            color: #1a1a1a;
          "
        >
          Taking longer than usual
        </h2>
        <p
          style="
            margin: 0 0 20px;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
          "
        >
          This can happen when your browser has an outdated version cached. Tap
          below to fix it.
        </p>
        <button
          id="clear-cache-btn"
          style="
            background: #5276b0;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
          "
        >
          Clear Cache &amp; Reload
        </button>
      </div>
    </div>
    <script>
      (function () {
        var t = setTimeout(function () {
          var f = document.getElementById("loading-fallback");
          var r = document.getElementById("root");
          if (f && r && r.children.length === 0) {
            f.style.display = "flex";
          }
        }, 8000);
        var obs = new MutationObserver(function () {
          var r = document.getElementById("root");
          if (r && r.children.length > 0) {
            clearTimeout(t);
            obs.disconnect();
          }
        });
        obs.observe(document.getElementById("root"), { childList: true });
        function clearAndReload() {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                return Promise.all(
                  regs.map(function (r) {
                    return r.unregister();
                  }),
                );
              })
              .then(function () {
                return caches.keys();
              })
              .then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  }),
                );
              })
              .then(function () {
                window.location.reload();
              })
              .catch(function () {
                window.location.reload();
              });
          } else {
            window.location.reload();
          }
        }
        var btn = document.getElementById("clear-cache-btn");
        if (btn) {
          btn.addEventListener("click", function () {
            btn.textContent = "Clearing...";
            btn.disabled = true;
            clearAndReload();
          });
        }
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.addEventListener("message", function (event) {
            if (event.data && event.data.type === "SW_UPDATED") {
              console.log(
                "[SW] Service worker updated to v" +
                  event.data.version +
                  ", reloading...",
              );
              window.location.reload();
            }
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
